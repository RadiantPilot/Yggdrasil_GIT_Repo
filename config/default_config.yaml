# =============================================================================
# Stewart Platform - Standard konfigurasjon
# =============================================================================
# Denne filen inneholder alle justerbare parametere for plattformen.
# Rediger verdiene her for å tilpasse systemet uten å endre koden.
# Last inn med: PlatformConfig.load("config/default_config.yaml")
# =============================================================================

# --- I2C-innstillinger ---
# Bussnummer: 1 er standard på Raspberry Pi 4B (GPIO 2/3).
# Adressene kan endres ved å justere adressepinnene på komponentene.
i2c_bus_number: 1
pca9685_address: 0x40          # PCA9685 PWM-driver (standard: 0x40)
pca9685_frequency: 50          # Hz - standard for servoer (20 ms periode)

# Bunnplate-IMU: LSM9DS1 (9DOF — akselerometer + gyroskop + magnetometer).
# address: I2C for akselerometer/gyroskop (SA0=lav → 0x6A, SA0=høy → 0x6B).
# mag_address: I2C for magnetometeret (SDO_M=lav → 0x1C, SDO_M=høy → 0x1E).
# mounting_rotation_deg: [roll, pitch, yaw] offset for monteringsretning.
base_imu:
  address: 0x6A
  mag_address: 0x1C
  mounting_rotation_deg: [0.0, 0.0, 0.0]

# Toppplate-IMU: LSM6DSOX (6DOF — akselerometer + gyroskop).
# Montert på den bevegelige toppplaten for direkte plattformmåling.
# SA0-pinnen MÅ settes høy (0x6B) for å unngå adressekollisjon med bunn-IMU.
platform_imu:
  address: 0x6B
  mounting_rotation_deg: [0.0, 0.0, 0.0]

# --- Plattformgeometri ---
# Alle lengder i millimeter, alle vinkler i grader.
# Juster disse etter den faktiske plattformen er bygget.
base_radius: 100.0             # Radius fra senter til leddpunkt på bunnplaten
platform_radius: 100.0          # Radius fra senter til leddpunkt på toppplaten
servo_horn_length: 50.0        # Lengde på servoarmen (horn)
rod_length: 83.0              # Lengde på forbindelsesstagen
home_height: 70.0             # Hvilehøyde for toppplaten over bunnplaten

# Vinkler (i grader) for de 6 leddpunktene på hver plate.
# Juster for å matche fysisk plassering av leddene.
base_joint_angles:
  - 105.0  # servo 1: oppe-høyre
  - 45.0   # servo 2: høyre
  - 345.0  # servo 3: nede-høyre
  - 285.0  # servo 4: nede-venstre
  - 225.0  # servo 5: venstre
  - 165.0  # servo 6: oppe-venstre

platform_joint_angles:
  - 135.0
  - 75.0
  - 15.0
  - 315.0
  - 255.0
  - 195.0

# --- Servokonfigurasjon ---
# Hver servo har individuell konfigurasjon for enkel tilpasning.
# channel:           PCA9685-kanal (0-15)
# min_pulse_us:      Minimum pulsbredde i mikrosekunder
# max_pulse_us:      Maksimum pulsbredde i mikrosekunder
# min_angle_deg:     Minimum vinkel (mekanisk grense)
# max_angle_deg:     Maksimum vinkel (mekanisk grense)
# home_angle_deg:    Nøytral vinkel (hjemmeposisjon)
# direction:         Rotasjonsretning (+1 normal, -1 invertert)
# offset_deg:        Kalibreringsoffset i grader
# mounting_angle_deg: Servoens monteringsvinkel på bunnplaten
servo_configs:
  - channel: 0
    min_pulse_us: 500
    max_pulse_us: 2500
    min_angle_deg: 0.0
    max_angle_deg: 180.0
    home_angle_deg: 90.0
    direction: 1
    offset_deg: 0.0
    mounting_angle_deg: 105.0
    max_slew_rate_deg_per_s: 120.0

  - channel: 1
    min_pulse_us: 500
    max_pulse_us: 2500
    min_angle_deg: 0.0
    max_angle_deg: 180.0
    home_angle_deg: 90.0
    direction: -1
    offset_deg: 0.0
    mounting_angle_deg: 45.0
    max_slew_rate_deg_per_s: 120.0

  - channel: 2
    min_pulse_us: 500
    max_pulse_us: 2500
    min_angle_deg: 0.0
    max_angle_deg: 180.0
    home_angle_deg: 90.0
    direction: 1
    offset_deg: 0.0
    mounting_angle_deg: 345.0
    max_slew_rate_deg_per_s: 120.0

  - channel: 3
    min_pulse_us: 500
    max_pulse_us: 2500
    min_angle_deg: 0.0
    max_angle_deg: 180.0
    home_angle_deg: 90.0
    direction: -1
    offset_deg: 0.0
    mounting_angle_deg: 285.0
    max_slew_rate_deg_per_s: 120.0

  - channel: 4
    min_pulse_us: 500
    max_pulse_us: 2500
    min_angle_deg: 0.0
    max_angle_deg: 180.0
    home_angle_deg: 90.0
    direction: 1
    offset_deg: 0.0
    mounting_angle_deg: 225.0
    max_slew_rate_deg_per_s: 120.0

  - channel: 5
    min_pulse_us: 500
    max_pulse_us: 2500
    min_angle_deg: 0.0
    max_angle_deg: 180.0
    home_angle_deg: 90.0
    direction: -1
    offset_deg: 0.0
    mounting_angle_deg: 165.0
    max_slew_rate_deg_per_s: 120.0

# --- PID-regulatorinnstillinger ---
# Start med lave verdier og juster opp gradvis under testing.
# output_min/output_max er per-tick korreksjon i samme enhet som
# aksen (mm for X/Y/Z, grader for roll/pitch/yaw).
pid_gains:
  kp: 1.0                     # Proporsjonal forsterkning
  ki: 0.0                     # Integral forsterkning (start med 0)
  kd: 0.0                     # Derivat forsterkning (start med 0)
  output_min: -30.0             # Maks korreksjon nedover per tick
  output_max: 30.0              # Maks korreksjon oppover per tick
  integral_limit: 100.0        # Anti-windup grense

# Kontrollsløyfe-frekvens i Hz. Holdt lavt (25 Hz) for å gi
# polling- og knapp-tråden god margin på I2C-locken på Pi 4B.
control_loop_rate_hz: 25.0
imu_fusion_alpha: 0.98          # Komplementærfilter-vekting (0=kun accel, 1=kun gyro)

# --- Sikkerhetsgrenser ---
# Plattformen styres kun rotasjonelt — translasjon-grenser er fjernet.
safety_config:
  enabled: true                        # Slå av for bringup/tuning
  max_rotation_deg: 30.0               # Maks rotasjon fra nøytral
  max_angular_velocity_deg_per_s: 300.0 # Maks vinkelhastighet
  servo_angle_margin_deg: 3.0          # Sikkerhetsmargin fra mekanisk grense (økt fra 1° — reelle servoer har ±1-3° spill)
  watchdog_timeout_s: 1.0              # Watchdog-tidsgrense
  imu_fault_threshold_g: 4.0           # Terskel for IMU-feildeteksjon

# --- Knappekort ---
# 5-knappers navigasjonskort (pluss-mønster) for å styre GUI-en uten
# mus eller tastatur. Backend velger om knappene leses direkte fra
# RPi GPIO eller via en ATTINY1624 over I2C.
#   gpio: pin 11, 13, 15, 19, 21 = GPIO 17, 27, 22, 10, 9 (alle pull-up).
#   i2c:  ATTINY-firmware (firmware/knappekort.ino) på adresse 0x20.
#   mock: brukes med --mock-flagget; tastatur-piler styrer da GUI-et.
button_config:
  enabled: true
  backend: i2c                 # gpio | i2c | mock
  poll_hz: 50.0
  debounce_ms: 20.0
  long_press_ms: 1000.0        # >1 s på midt-knappen utløser E-STOP
  gpio_pins: [17, 27, 22, 10, 9]
  i2c_address: 0x20
  i2c_button_bits: [0, 1, 2, 3, 4]
  nudge_steps:
    rotation_deg: 1.0
    pid_kp: 0.05
    pid_ki: 0.05
    pid_kd: 0.005
